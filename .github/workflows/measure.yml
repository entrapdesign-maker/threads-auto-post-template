name: Measure

# C→A の計測エージェント。Threads Insights を取得し、伸びた投稿の傾向を learnings.md に反映する。
on:
  schedule:
    # 毎日 22:00 JST (= 13:00 UTC)、最後の21:00投稿のあとに集計
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      days:
        description: "集計する直近日数 (デフォルト: 14)"
        required: false
        default: "14"

permissions:
  contents: write

jobs:
  measure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Measure & update learnings
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          MEASURE_DAYS: ${{ github.event.inputs.days || '14' }}
          TZ: "Asia/Tokyo"
        run: python scripts/measure.py

      - name: Commit insights & learnings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add insights/ prompts/learnings.md
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore(insights): update metrics and learnings [skip ci]"
            git push
          fi
