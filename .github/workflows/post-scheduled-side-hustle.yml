name: Post Scheduled (side-hustle)

# side-hustle アカウント(ai_lab_6960)用の投稿。ACCOUNT=side-hustle で
# accounts/side-hustle/drafts の予約時刻に達した枠を投稿する。
#
# メイン単発で自動投稿を有効化(2026-07-06)。返信(ツリー化)はAPI権限エラーのため
# 現状スキップされ、メインのみ投稿される。post_threads.py が返信失敗時もメインを
# 投稿済みにマークするので重複投稿は起きない。返信権限が直ったら自動で5ツリー型に戻る。
on:
  schedule:
    # 毎時0分はGitHub側が最も混雑し遅延・スキップされやすいので、混雑を避けた
    # 分(:08 と :38)に2回チェックする。予約時刻(07/12/19/21時)を多少過ぎても
    # 次のチェックで拾える。GitHubのschedule自体に数分〜1時間の遅延はあり得る。
    - cron: "8,38 * * * *"
  workflow_dispatch:
    inputs:
      force_date:
        description: "強制的に投稿する日付 (YYYY-MM-DD, 任意)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Post to Threads
        env:
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID_SIDEHUSTLE }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN_SIDEHUSTLE }}
          ACCOUNT: side-hustle
          EXPECTED_USERNAME: ai_lab_6960
          FORCE_DATE: ${{ github.event.inputs.force_date || '' }}
          TZ: "Asia/Tokyo"
        run: python scripts/post_threads.py

      - name: Commit posted log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add accounts/side-hustle/drafts/
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore(side-hustle): mark posted [skip ci]"
            git push
          fi
