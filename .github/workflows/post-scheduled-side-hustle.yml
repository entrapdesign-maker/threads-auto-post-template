name: Post Scheduled (side-hustle)

# side-hustle アカウント(ai_lab_6960)用の投稿。ACCOUNT=side-hustle で
# accounts/side-hustle/drafts の予約時刻に達した枠を投稿する。
#
# ⚠️ 現在は「返信(ツリー化)のAPI権限エラー」が未解決のため、自動スケジュールは
#    保留(コメントアウト)。手動実行(workflow_dispatch)のみ有効。
#    返信が通るようになったら、下の schedule の2行のコメントを外せば毎時自動投稿が始まる。
#    (post_threads.py は返信失敗時もメインを投稿済みにマークするので、重複投稿は起きない)
on:
  # schedule:
  #   - cron: "0 * * * *"   # JST 毎時0分にチェック。返信が直ったらこの2行を有効化する
  workflow_dispatch:
    inputs:
      force_date:
        description: "強制的に投稿する日付 (YYYY-MM-DD, 任意)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Post to Threads
        env:
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID_SIDEHUSTLE }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN_SIDEHUSTLE }}
          ACCOUNT: side-hustle
          FORCE_DATE: ${{ github.event.inputs.force_date || '' }}
          TZ: "Asia/Tokyo"
        run: python scripts/post_threads.py

      - name: Commit posted log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add accounts/side-hustle/drafts/
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore(side-hustle): mark posted [skip ci]"
            git push
          fi
